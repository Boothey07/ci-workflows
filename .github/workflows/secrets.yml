name: Secret scan (reusable)

# GitHub's own secret scanning is public-repo-only without Advanced Security,
# and CodeQL is likewise public-only. gitleaks fills that gap and is free for
# personal accounts.

on:
  workflow_call:
    inputs:
      runs-on:
        type: string
        default: '["ubuntu-latest"]'

permissions:
  contents: read

jobs:
  gitleaks:
    name: Secrets
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so a secret added earlier in the branch is still caught.
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}

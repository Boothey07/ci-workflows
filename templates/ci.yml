# Copy to .github/workflows/ci.yml in a consumer repo and adjust `with:`.
#
# pull_request ONLY — adding `push` as well double-bills every PR.
name: CI

on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  hygiene:
    uses: Boothey07/ci-workflows/.github/workflows/pr-hygiene.yml@v2

  secrets:
    uses: Boothey07/ci-workflows/.github/workflows/secrets.yml@v2

  python:
    uses: Boothey07/ci-workflows/.github/workflows/python-ci.yml@v2
    with:
      paths: "."
      python-versions: '["3.11","3.12","3.13"]'
      # Stay off billed minutes where a runner is registered for this repo:
      # runs-on: '["self-hosted","linux","vps"]'
      #
      # Only turn this on where tests actually exist. A green "Test" job that
      # ran nothing is worse than no job at all — it reads as coverage.
      run-tests: false

  quality-gate:
    name: Quality Gate
    if: always()
    needs: [hygiene, secrets, python]
    uses: Boothey07/ci-workflows/.github/workflows/quality-gate.yml@v2
    with:
      results: ${{ toJSON(needs) }}
      required-jobs: hygiene,secrets,python
